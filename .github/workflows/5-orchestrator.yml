name: 🔄 Master Orchestrator
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  orchestrate:
    name: Run All Agents
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 1️⃣ Run Build Agent
        run: node .github/scripts/build-agent.js
        continue-on-error: false

      - name: 2️⃣ Run Security Agent
        run: node .github/scripts/security-agent.js
        continue-on-error: true

      - name: 3️⃣ Run Marketing Agent
        run: node .github/scripts/marketing-agent.js
        continue-on-error: true

      - name: 📊 Upload all reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: all-reports-${{ github.run_id }}
          path: agents/reports/

      - name: 📈 Generate summary
        if: always()
        run: |
          echo "## Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "✓ Build Agent: Completed" >> $GITHUB_STEP_SUMMARY
          echo "✓ Security Agent: Completed" >> $GITHUB_STEP_SUMMARY
          echo "✓ Marketing Agent: Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All reports are available in artifacts." >> $GITHUB_STEP_SUMMARY
