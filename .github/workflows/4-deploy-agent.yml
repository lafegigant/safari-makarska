name: 🚀 Deployment Agent
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'staging' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build application
        run: npm run build

      - name: 🚀 Run Deployment Agent
        run: node .github/scripts/deploy-agent.js

      - name: 📊 Upload deployment report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: deploy-report-${{ github.run_id }}
          path: agents/reports/deploy-report.md

      - name: ✅ Deployment successful
        if: success()
        run: echo "Deployment to ${{ github.event.inputs.environment || 'staging' }} completed successfully!"

      - name: ❌ Deployment failed
        if: failure()
        run: echo "Deployment failed!" && exit 1
